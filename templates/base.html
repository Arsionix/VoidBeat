<!doctype html>
<html>
<head>
    <title>VoidBeat</title>
</head>
<body>
    {% if current_user.is_authenticated %}
        <p>Привет, {{ current_user.name }}! <a href="/logout">Выйти</a></p>
    {% else %}
        <p><a href="/login">Войти</a> | <a href="/register">Регистрация</a></p>
    {% endif %}
    <hr>
    {% block content %}{% endblock %}
</body>
</html>
