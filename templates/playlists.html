{% extends "base.html" %}

{% block content %}
<h1>Мои плейлисты</h1>

<div class="row">
    <div class="col-md-4">
        <h3>Список плейлистов</h3>
        <div id="playlists-list"></div>
        
        <h4>Создать новый плейлист</h4>
        <input type="text" id="playlist-name" class="form-control" placeholder="Название плейлиста">
        <button id="create-btn" class="btn btn-primary mt-2">Создать</button>
    </div>
    
    <div class="col-md-8">
        <h3>Треки в плейлисте <span id="current-playlist-name"></span></h3>
        <div id="playlist-tracks"></div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/playlists-page.js') }}"></script>
{% endblock %}
