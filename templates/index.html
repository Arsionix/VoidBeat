{% extends "base.html" %}

{% block content %}
<h1>VoidBeat</h1>
<h2>Список треков</h2>

<div id="track-list"></div>

<hr>

<h3>Сейчас играет:</h3>
<div id="current-track">—</div>

<audio id="player" controls></audio>

<script>
    fetch('/api/tracks')
        .then(response => response.json())
        .then(tracks => {
            const container = document.getElementById('track-list');
            container.innerHTML = '';
            
            for (let i = 0; i < tracks.length; i++) {
                const track = tracks[i];
                
                const card = document.createElement('div');
                card.style.border = '1px solid gray';
                card.style.margin = '10px';
                card.style.padding = '10px';
                card.style.borderRadius = '5px';
                
                const title = document.createElement('strong');
                title.textContent = track.title + ' - ' + track.artist;
                card.appendChild(title);
                card.appendChild(document.createElement('br'));
                
                const likeBtn = document.createElement('button');
                if (track.user_liked) {
                    likeBtn.textContent = '❤️ ' + track.likes;
                    likeBtn.style.color = 'red';
                } else {
                    likeBtn.textContent = '🤍 ' + track.likes;
                }
                
                likeBtn.onclick = function() {
                    const logoutBtn = document.querySelector('a[href="/logout"]');
    
                    if (!logoutBtn) {
                        er_mess = document.createElement('p');
                        er_mess.textContent = 'Нужно войти, чтобы ставить лайки';
                        er_mess.style.color = 'red';
                        card.appendChild(er_mess);

                        setTimeout(() => {
                            er_mess.remove();
                        }, 3000)
                        return;
                    }
                    
                    fetch('/api/rate', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({track_id: track.id})
                    })
                    .then(response => {
                        if (response.ok) {
                            location.reload();
                        }
                    });
                };
                card.appendChild(likeBtn);

                const playlistBtn = document.createElement('button');
                playlistBtn.textContent = ' 📁 В плейлист';
                playlistBtn.onclick = function() {
                    const logoutBtn = document.querySelector('a[href="/logout"]');
                    if (!logoutBtn) {
                        alert('Нужно войти, чтобы добавлять в плейлисты');
                        return;
                    }
                    fetch('/api/playlists')
                        .then(response => response.json())
                        .then(playlists => {
                            if (playlists.length === 0) {
                                alert('У вас нет плейлистов. Создайте сначала на странице /playlists');
                                return;
                            }
                            
                            let message = 'Выберите плейлист:\n';
                            for (let i = 0; i < playlists.length; i++) {
                                message += (i + 1) + '. ' + playlists[i].name + '\n';
                            }
                            const choice = prompt(message);
                            const index = parseInt(choice) - 1;
                            
                            if (index >= 0 && index < playlists.length) {
                                const playlist = playlists[index];
                                fetch(`/api/playlists/${playlist.id}/tracks`, {
                                    method: 'POST',
                                    headers: {'Content-Type': 'application/json'},
                                    body: JSON.stringify({track_id: track.id})
                                }).then(() => {
                                    alert('Трек добавлен в плейлист!');
                                });
                            }
                        });
                };
                card.appendChild(playlistBtn);

                const playlistDelBtn = document.createElement('button');
                playlistDelBtn.textContent = ' ❌ Удалить из плейлиста';
                playlistDelBtn.onclick = function() {
                    const logoutBtn = document.querySelector('a[href="/logout"]');
                    if (!logoutBtn) {
                        alert('Нужно войти, чтобы удалять из плейлистов');
                        return;
                    }
                    fetch('/api/playlists')
                        .then(response => response.json())
                        .then(playlists => {
                            if (playlists.length === 0) {
                                alert('У вас нет плейлистов');
                                return;
                            }
                            
                            let message = 'Из какого плейлиста удалить?\n';
                            for (let i = 0; i < playlists.length; i++) {
                                message += (i + 1) + '. ' + playlists[i].name + '\n';
                            }
                            const choice = prompt(message);
                            const index = parseInt(choice) - 1;
                            
                            if (index >= 0 && index < playlists.length) {
                                const playlist = playlists[index];
                                fetch(`/api/playlists/${playlist.id}/tracks/${track.id}`, {
                                    method: 'DELETE',
                                    headers: {'Content-Type': 'application/json'}
                                }).then(() => {
                                    alert('Трек удалён из плейлиста!');
                                });
                            }
                        });
                };
                card.appendChild(playlistDelBtn);
                
                const playBtn = document.createElement('button');
                playBtn.textContent = ' ▶ Воспроизвести';
                playBtn.onclick = function() {
                    const player = document.getElementById('player');
                    player.src = track.file_url;
                    player.play();
                    const current = document.getElementById('current-track');
                    current.textContent = track.title;
                };
                card.appendChild(playBtn);
                
                container.appendChild(card);
            }
        });
</script>
{% endblock %}
