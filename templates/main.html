{% extends "base.html" %}

{% block content %}
<h1>VoidBeat</h1>

<div style="margin: 20px 0;">
    <button class="mode-btn" data-mode="all">Все</button>
    <button class="mode-btn" data-mode="flow">Flow</button>
    <button class="mode-btn" data-mode="deep">Deep</button>
    <button class="mode-btn" data-mode="reset">Reset</button>
</div>

<div style="margin: 20px 0;">
    <input type="text" id="search-input" placeholder="Поиск по названию или исполнителю..." style="width: 300px; padding: 8px;">
    <button id="search-btn">Найти</button>
    <button id="clear-search">Очистить</button>
</div>

<div style="margin: 20px 0; padding: 15px; border: 1px solid #ddd;">
    <h3>Pomodoro</h3>
    <div>
        <span id="timerMode" style="font-size: 14px;">Работа</span>
        <div>
            <span id="timer" style="font-size: 32px; font-family: monospace;">25:00</span>
        </div>
    </div>
    <div style="margin-top: 10px;">
        <button onclick="pomodoroStart()">Старт</button>
        <button onclick="pomodoroPause()">Пауза</button>
        <button onclick="pomodoroReset()">Сброс</button>
    </div>
</div>

<div id="pomodoro-notification" style="display: none; margin: 10px 0; padding: 10px; border: 1px solid #ccc; background-color: #f9f9f9;">
    <p id="notification-message"></p>
    <button onclick="pomodoroConfirm()" id="notification-ok">OK</button>
    <button onclick="pomodoroCancel()" id="notification-cancel">Отмена</button>
</div>

<h2>Список треков</h2>
<div id="track-list"></div>

<hr>
<h3>Сейчас играет:</h3>
<div id="current-track">—</div>
<audio id="player" controls></audio>

<script src="{{ url_for('static', filename='js/pomodoro.js') }}"></script>
<script src="{{ url_for('static', filename='js/likes.js') }}"></script>
<script src="{{ url_for('static', filename='js/playlists.js') }}"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% endblock %}
