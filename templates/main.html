{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="text-center mb-4">
        <div class="btn-group">
            <button class="btn btn-outline-light mode-btn" data-mode="all">Все</button>
            <button class="btn btn-outline-light mode-btn" data-mode="flow">Flow</button>
            <button class="btn btn-outline-light mode-btn" data-mode="deep">Deep</button>
            <button class="btn btn-outline-light mode-btn" data-mode="reset">Reset</button>
        </div>
    </div>

    <div id="track-list"></div>
</div>

<audio id="player" controls></audio>

<div class="fixed-bottom bg-dark text-white p-2">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-4">
                <strong>Сейчас играет:</strong> <span id="current-track">—</span>
            </div>
            <div class="col-md-4 text-center">
                <button id="pomodoro-start" onclick="pomodoroStart()" class="btn btn-sm btn-outline-light">Старт</button>
                <button id="pomodoro-pause" onclick="pomodoroPause()" class="btn btn-sm btn-outline-light">Пауза</button>
                <button id="pomodoro-reset" onclick="pomodoroReset()" class="btn btn-sm btn-outline-light">Сброс</button>
                <div><span id="timer-mode">Работа</span>: <span id="timer">25:00</span></div>
            </div>
        </div>
    </div>
</div>

<div id="pomodoro-notification" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#1E1E1E; color:white; padding:20px; border-radius:10px; z-index:1000;">
    <p id="notification-message"></p>
    <button id="notification-confirm" onclick="pomodoroConfirm()" class="btn btn-success btn-sm">Да</button>
    <button id="notification-cancel" onclick="pomodoroCancel()" class="btn btn-danger btn-sm">Нет</button>
</div>

<script src="{{ url_for('static', filename='js/pomodoro.js') }}"></script>
<script src="{{ url_for('static', filename='js/likes.js') }}"></script>
<script src="{{ url_for('static', filename='js/playlists.js') }}"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% endblock %}
